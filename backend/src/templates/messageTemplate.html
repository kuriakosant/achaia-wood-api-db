<div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
    <!-- Header -->
    <div style="background-color: #2563eb; color: white; padding: 25px 20px; text-align: center;">
        <h2 style="margin: 0; font-size: 24px; color: #ffffff;">Νέο Μήνυμα! ✉️</h2>
        <p style="margin: 5px 0 0 0; font-size: 14px; color: #dbeafe; font-weight: normal;">Εισερχόμενο από το Achaia Wood</p>
    </div>

    <!-- Body -->
    <div style="padding: 30px; background-color: #ffffff;">
        <p style="margin-top: 0; font-size: 16px; color: #374151;"><strong>Καλησπέρα,</strong></p>
        <p style="font-size: 15px; color: #4b5563; margin-bottom: 25px;">Ένας πελάτης έστειλε νέο μήνυμα μέσου της φόρμας επικοινωνίας:</p>
        
        <!-- Table -->
        <table style="width: 100%; border-collapse: collapse; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden;">
            <tr>
                <td style="padding: 12px 15px; width: 30%; color: #1e40af; font-weight: bold; border-bottom: 1px solid #e5e7eb; background-color: #eff6ff;">Όνομα:</td>
                <td style="padding: 12px 15px; color: #1f2937; border-bottom: 1px solid #e5e7eb; border-left: 1px solid #e5e7eb; background-color: #ffffff;">{{name}}</td>
            </tr>
            <tr>
                <td style="padding: 12px 15px; color: #1e40af; font-weight: bold; border-bottom: 1px solid #e5e7eb; background-color: #eff6ff;">Email:</td>
                <td style="padding: 12px 15px; color: #1f2937; border-bottom: 1px solid #e5e7eb; border-left: 1px solid #e5e7eb; background-color: #ffffff;">{{email}}</td>
            </tr>
            <tr>
                <td style="padding: 12px 15px; color: #1e40af; font-weight: bold; background-color: #eff6ff;">Τηλέφωνο:</td>
                <td style="padding: 12px 15px; color: #1f2937; border-left: 1px solid #e5e7eb; background-color: #ffffff;">{{phone}}</td>
            </tr>
        </table>
        
        <!-- Message -->
        <div style="margin-top: 25px;">
            <strong style="color: #374151; font-size: 15px; display: block; margin-bottom: 8px;">Το μήνυμά του:</strong>
            <div style="padding: 20px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; color: #334155; font-size: 15px; line-height: 1.6; white-space: pre-line;">{{message}}</div>
        </div>

        <div style="text-align: center; margin-top: 35px;">
            <a href="https://achaiawood.gr/admin/login" style="background-color: #2563eb; color: white; padding: 14px 28px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 16px; display: inline-block;">Προβολή στο Admin Panel</a>
        </div>
    </div>
</div>
